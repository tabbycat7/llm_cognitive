# Conda 环境：在项目根目录执行
#   conda env create -f environment.yml
#   conda activate llm_cognitive
# 然后按 CLI.md 安装 PyTorch（GPU）：https://pytorch.org/get-started/locally/
#   pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
# （把 cu124 换成与你的显卡 / 驱动匹配的版本）

name: llm_cognitive
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - openai>=1.0
      - matplotlib>=3.7
      - datasets>=2.14
      - python-dotenv>=1.0
      - wordcloud>=1.9
      - numpy>=1.24
      - scipy>=1.10
      - scikit-learn>=1.2
      - umap-learn>=0.5
      - sentence-transformers>=2.2
      - requests>=2.28
